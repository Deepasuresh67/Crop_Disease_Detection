# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - crop-disease-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: cropdiseaseacr123.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C51CB5DF4D114931AF3C54461DF1BD84 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_238FB309BCE84C37B76C1E9EF3D7150D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: cropdiseaseacr123.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C51CB5DF4D114931AF3C54461DF1BD84 }}/crop-disease:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_034BEF7F8E6A499698D1661CCE2E4414 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1BA89DB21B774F33A14E5148C84BDDB6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1DEA53027289489B85B420C6AEC28413 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'crop-disease-app'
          slot-name: 'Production'
          images: 'cropdiseaseacr123.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C51CB5DF4D114931AF3C54461DF1BD84 }}/crop-disease:${{ github.sha }}'
          